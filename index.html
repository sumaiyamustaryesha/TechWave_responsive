<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave Podcast</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header class="header">

        <div class="navbar container">

            <div class="logo">
                <h2>Tech<span>Wave</span></h2>
            </div>

            <nav class="nav_items">
                <ul>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Episodes</a></li>
                    <li><a href="#">Host</a></li>
                </ul>
            </nav>

            <div class="nav_right">
                <button class="common_btn">Subscribe<i class="fa-solid fa-arrow-right"></i></button>
            </div>

            <div class="menu_bar">
                <i class="fa-solid fa-bars"></i>
            </div>

        </div>

    </header>

    <main>


        <!-- HERO -->

        <section class="container">

            <div class="hero">

                <div class="hero_content">

                    <div class="podcast_circle">
                        <img src="./assets/microphone.png" alt="microphone">
                        <span class="new_badge">NEW</span>
                    </div>

                    <h1>TechWave</h1>
                    <p></p>

                    <pre>Your daily dose of tech insights, productivity hacks,and personal growth</pre>
                    <p></p>

                    <div class="hero_btns">

                        <button class="common_btn">
                            <i class="fa-brands fa-spotify"></i>
                            Listen on Spotify
                        </button>

                        <button class="subscribe_btn"> <pre>  <img src="./assets/message.png">  Subscribe  </pre>     </button>

                    </div>

                </div>

            </div>

        </section>


    </main>
